name: Sync to Gitee

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync repository to Gitee
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/${{ github.repository }}
          dst: gitee/minnmeichan/minnmeichan
          dst_key: ${{ secrets.GITEE_TOKEN }}
          force_update: true
